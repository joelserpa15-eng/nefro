name: Weekly Nephrology Briefing Update

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 07:00 UTC
  workflow_dispatch:
    inputs:
      days:
        description: 'Days to look back (default: 14)'
        required: false
        default: '14'

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch Articles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch weekly articles from PubMed & Europe PMC
        env:
          NCBI_EMAIL:   ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python scripts/fetch_articles.py --days "${{ github.event.inputs.days || '14' }}"

      - name: Fetch top annual articles from PubMed & Europe PMC
        env:
          NCBI_EMAIL:   ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python scripts/fetch_top_annual.py --days 365

      - name: Fetch top 5-year articles from PubMed & Europe PMC
        env:
          NCBI_EMAIL:   ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          python scripts/fetch_top_5years.py --days 1825

      - name: Commit & push updated articles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/; then
            echo "No changes - skipping commit."
          else
            git add data/articles.json data/index.json data/articles-*.json data/top-annual.json data/top-5years.json
            git commit -m "data: briefing nefrologico semanal $(date -u '+%Y-%m-%d')"
            git push origin HEAD
          fi
